<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Resmi SMAN 1 TAMANSARI</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === RESET & VARIABEL === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #1e3c72;
            --secondary: #2a5298;
            --accent: #ffb703;
            --bg-color: #0f172a;
            --text-light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* === PARALLAX HERO SECTION === */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        /* Animated Gradient Background */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 120%; /* Lebih besar untuk efek parallax */
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #0f172a, #112240);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
            transform: translateZ(0);
        }

        /* Motion Graphic Elements */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,183,3,0.3) 0%, rgba(255,183,3,0) 70%);
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }
        .circle-1 { width: 400px; height: 400px; top: -100px; left: -100px; animation-delay: 0s; }
        .circle-2 { width: 600px; height: 600px; bottom: -200px; right: -150px; animation-delay: 2s; }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }

        .hero-content {
            z-index: 1;
            padding: 20px;
            transform: translateY(0);
            transition: transform 0.1s ease-out;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            color: var(--accent);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-20px) translateX(-50%); }
            60% { transform: translateY(-10px) translateX(-50%); }
        }

        /* === PORTAL MENU SECTION === */
        .portal-section {
            padding: 100px 5%;
            position: relative;
            z-index: 10;
            background: var(--bg-color);
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 60px;
            position: relative;
        }
        
        .section-title::after {
            content: '';
            width: 80px;
            height: 4px;
            background: var(--accent);
            display: block;
            margin: 15px auto 0;
            border-radius: 2px;
        }

        /* Grid Layout */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Glassmorphism Card */
        .menu-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            text-decoration: none;
            color: var(--text-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(50px);
            position: relative;
            overflow: hidden;
        }

        /* Animasi Sorotan saat Hover */
        .menu-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: all 0.7s ease;
        }

        .menu-card:hover::before {
            left: 200%;
        }

        .menu-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255,183,3,0.2);
            border-color: rgba(255,183,3,0.4);
            background: rgba(255,255,255,0.1);
        }

        .menu-card i {
            font-size: 3.5rem;
            color: var(--accent);
            margin-bottom: 20px;
            transition: transform 0.4s ease;
        }

        .menu-card:hover i {
            transform: scale(1.2) rotate(5deg);
        }

        .menu-card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .menu-card p {
            font-size: 0.9rem;
            opacity: 0.7;
            line-height: 1.5;
        }

        /* Class untuk animasi muncul saat di-scroll */
        .menu-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* === FOOTER === */
        footer {
            text-align: center;
            padding: 30px;
            background: rgba(0,0,0,0.5);
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .hero p { font-size: 1rem; }
            .section-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- HERO SECTION DENGAN EFEK PARALLAX -->
    <header class="hero" id="home">
        <div class="hero-bg" id="hero-bg"></div>
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        
        <div class="hero-content" id="hero-content">
            <h1>SMAN 1 TAMANSARI</h1>
            <p>Sistem Layanan Terpadu & Digitalisasi Pendidikan</p>
            <a href="#portals" style="text-decoration:none;">
                <div style="padding: 12px 30px; background: var(--accent); color: #000; border-radius: 30px; font-weight: bold; display: inline-block; margin-top: 20px; transition: 0.3s; box-shadow: 0 10px 20px rgba(255,183,3,0.3);">
                    Masuk Portal
                </div>
            </a>
        </div>
        
        <div class="scroll-indicator">
            <i class="fas fa-chevron-down"></i>
        </div>
    </header>

    <!-- PORTAL MENU SECTION -->
    <section class="portal-section" id="portals">
        <h2 class="section-title">Direktori Portal</h2>
        
        <!-- Wadah Grid untuk Menu (Diisi Otomatis oleh JavaScript) -->
        <div class="menu-grid" id="menu-container">
            <!-- Menu Cards akan di-render di sini -->
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 SMAN 1 TAMANSARI. Hak Cipta Dilindungi.</p>
    </footer>

    <!-- JAVASCRIPT -->
    <script>
        /**
         * 1. DATA MENU PORTAL
         * Anda dapat MENAMBAHKAN, MENGHAPUS, atau MENGUBAH menu di bawah ini dengan sangat mudah.
         * Cukup tambahkan object baru ke dalam array `portalMenus`.
         */
        const portalMenus = [
            {
                title: "Portal Piket",
                link: "https://piketsmanit26.web.app/",
                icon: "fas fa-calendar-alt",
                desc: "Manajemen dan pencatatan piket harian sekolah."
            },
            {
                title: "Portal BK",
                link: "https://piketsmanit26.web.app/siskomen.html",
                icon: "fas fa-user-shield",
                desc: "Layanan Bimbingan dan Konseling terpadu untuk siswa."
            },
            {
                title: "Portal Siswa",
                link: "https://piketsmanit26.web.app/report_siswa.html",
                icon: "fas fa-user-graduate",
                desc: "Informasi nilai, raport, dan layanan akademik siswa."
            },
            {
                title: "Portal LMS Guru",
                link: "https://smanitlms26.web.app/#",
                icon: "fas fa-chalkboard-teacher",
                desc: "Sistem Manajemen Pembelajaran khusus Tenaga Pendidik."
            },
            {
                title: "Portal LMS Kokulikuler",
                link: "https://smanitlms26.web.app/siswa.html",
                icon: "fas fa-users-cog",
                desc: "Akses pembelajaran dan absensi kegiatan kokulikuler."
            }
            /* 
            Contoh cara menambahkan menu baru:
            ,{
                title: "Portal Perpustakaan",
                link: "https://perpus.smanit.edu",
                icon: "fas fa-book",
                desc: "Akses e-book dan peminjaman buku digital."
            }
            */
        ];

        /**
         * 2. RENDER MENU KE HTML (Dynamic Rendering)
         */
        const menuContainer = document.getElementById('menu-container');
        
        portalMenus.forEach((menu, index) => {
            const card = document.createElement('a');
            card.href = menu.link;
            card.className = 'menu-card';
            card.target = "_blank"; // Buka di tab baru
            // Atur delay animasi secara berurutan agar atraktif
            card.style.transitionDelay = `${index * 0.1}s`; 

            card.innerHTML = `
                <i class="${menu.icon}"></i>
                <h3>${menu.title}</h3>
                <p>${menu.desc}</p>
            `;
            menuContainer.appendChild(card);
        });

        /**
         * 3. EFEK PARALLAX PADA SCROLL
         */
        const heroBg = document.getElementById('hero-bg');
        const heroContent = document.getElementById('hero-content');

        window.addEventListener('scroll', () => {
            let scrollPosition = window.pageYOffset;
            // Geser background lebih lambat dari scroll (efek parallax)
            heroBg.style.transform = `translateY(${scrollPosition * 0.4}px)`;
            // Geser teks hero sedikit ke atas dan pudarkan
            heroContent.style.transform = `translateY(${scrollPosition * 0.2}px)`;
            heroContent.style.opacity = 1 - (scrollPosition / 600);
        });

        /**
         * 4. ANIMASI MUNCUL SAAT DI-SCROLL (Intersection Observer)
         */
        const observerOptions = {
            threshold: 0.1, // Trigger saat 10% elemen terlihat
            rootMargin: "0px 0px -50px 0px"
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    // Unobserve setelah animasi selesai agar tidak berulang terus
                    observer.unobserve(entry.target); 
                }
            });
        }, observerOptions);

        // Pasang observer ke semua kartu menu yang baru dibuat
        const menuCards = document.querySelectorAll('.menu-card');
        menuCards.forEach(card => {
            observer.observe(card);
        });
    </script>
</body>
</html>
