<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal SMAN 1 TAMANSARI</title>
    <!-- Menggunakan Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tema Dominan Terang */
        :root {
            --bg-color-1: #e0f2fe;
            --bg-color-2: #ffffff;
            --primary-color: #0284c7;
            --text-color: #334155;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
            color: var(--text-color);
            overflow: hidden; /* Mencegah scroll bar bawaan */
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none;
        }

        header {
            text-align: center;
            padding: 30px 20px 10px 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .school-logo {
            width: 90px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            letter-spacing: 1px;
        }

        header p {
            margin-top: 5px;
            font-size: 1.1rem;
            color: #64748b;
        }

        /* Container 3D Cover Flow */
        .scene {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* Kedalaman 3D untuk efek Flip */
            touch-action: pan-y;
            width: 100%;
            overflow: hidden;
        }

        .carousel {
            width: 100%;
            height: 250px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        .carousel-item {
            position: absolute;
            width: 240px;
            height: 180px;
            background: var(--card-bg);
            border: 2px solid #bae6fd;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(2, 132, 199, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: var(--text-color);
            cursor: pointer;
            /* Perubahan halus untuk efek hover non-transform */
            transition: background-color 0.3s;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .carousel-item i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            /* Efek transisi ditangani JS agar sinkron dengan Cover Flow */
        }

        .carousel-item span {
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            padding: 0 10px;
        }

        .instructions {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            pointer-events: none;
            
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Responsif untuk layar HP kecil */
        @media (max-width: 600px) {
            .carousel-item { width: 200px; height: 150px; }
            header h1 { font-size: 1.8rem; }
            .school-logo { width: 70px; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="Gemini_Generated_Image_bzyh71bzyh71bzyh.png" alt="Logo SMAN 1 TAMANSARI" class="school-logo">
        <h1>SMAN 1 TAMANSARI</h1>
        <p>Portal Layanan Kegiatan Pembelajaran T.A 2026-2027</p>
    </header>

    <div class="scene" id="scene">
        <div class="carousel" id="carousel">
            <!-- Item Menu digenerate di sini -->
        </div>
    </div>

    <div class="instructions">
        <i class="fas fa-hand-pointer"></i> Geser, scroll, atau klik menu di samping untuk memutar
    </div>

    <script>
        const menuData = [
            { id: 1, title: "Portal Piket (Siprestasi)", icon: "fa-clipboard-user", url: "https://piketsmanit26.web.app/" },
            { id: 2, title: "Portal BK", icon: "fa-user-tie", url: "https://piketsmanit26.web.app/siskomen.html" },
            { id: 3, title: "Portal Siswa", icon: "fa-user-graduate", url: "https://piketsmanit26.web.app/report_siswa.html" },
            { id: 4, title: "LMS Kordinator", icon: "fa-chalkboard-teacher", url: "https://smanitlms26.web.app/#" },
            { id: 5, title: "LMS Siswa (Kokulikuler)", icon: "fa-users-gear", url: "https://smanitlms26.web.app/siswa.html" },
            { id: 6, title: "Perangkat KBM", icon: "fa-folder", url: "https://drive.google.com/drive/folders/1twwuiIaemZdQE7xtTmlxEaxFoN-CpMUw" }
        ];

        const carousel = document.getElementById('carousel');
        const scene = document.getElementById('scene');
        const itemWidth = window.innerWidth <= 600 ? 200 : 240; 
        const items = [];

        // 1. Generate HTML Menu
        menuData.forEach((menu, index) => {
            const a = document.createElement('a');
            a.className = 'carousel-item';
            a.href = menu.url;
            a.innerHTML = `
                <i class="fa-solid ${menu.icon}"></i>
                <span>${menu.title}</span>
            `;
            carousel.appendChild(a);
            items.push(a);
        });

        // 2. Variabel State
        let currentIndex = 0;   // Posisi saat ini (bisa desimal untuk animasi)
        let targetIndex = 0;    // Posisi tujuan (0, 1, 2, dst)
        let isDragging = false;
        let startX = 0;
        let startDragIndex = 0;
        let hasMoved = false;
        let snapTimeout;

        // 3. Fungsi Render & Kalkulasi iTunes Cover Flow
        function animate() {
            // Efek Lerp (Pergerakan Halus)
            currentIndex += (targetIndex - currentIndex) * 0.1;

            items.forEach((item, i) => {
                const offset = i - currentIndex; // Jarak kartu ini dari pusat
                const absOffset = Math.abs(offset);
                const sign = Math.sign(offset);
                
                // Variabel t membatasi nilai maksimum efek rotasi utama (0 s/d 1)
                const t = Math.min(absOffset, 1); 

                // --- MATEMATIKA COVER FLOW ---
                // 1. Rotasi (Flip): Kartu kiri rotasi ke kanan, kartu kanan rotasi ke kiri (-60 derajat)
                const rotateY = sign * t * -60; 

                // 2. Kedalaman (Z): Kartu tengah di depan (0), kartu samping mundur ke belakang
                const translateZ = -t * 150 - absOffset * 20;

                // 3. Jarak (X): Mengatur tumpang tindih (overlap) antar kartu
                const overlap = itemWidth * 0.35; // Seberapa rapat kartu menumpuk
                const activeSpread = itemWidth * 0.45; // Jarak ekstra agar kartu tengah tidak tertutup
                const translateX = (offset * overlap) + (sign * t * activeSpread);

                // --- APLIKASI STYLE ---
                item.style.zIndex = Math.round(100 - absOffset * 10);
                item.style.transform = `translateX(${translateX}px) translateZ(${translateZ}px) rotateY(${rotateY}deg)`;
                
                // Efek memudar untuk kartu yang sangat jauh
                item.style.opacity = Math.max(1 - (absOffset * 0.15), 0);

                // Highlight khusus untuk kartu yang sedang aktif (berada di tengah)
                const icon = item.querySelector('i');
                if (absOffset < 0.5) {
                    item.style.borderColor = "var(--primary-color)";
                    item.style.boxShadow = "0 15px 40px rgba(2, 132, 199, 0.4)";
                    item.style.background = "#ffffff";
                    // Sedikit membesarkan ikon di tengah
                    icon.style.transform = `scale(${1 + (1 - t) * 0.15})`; 
                } else {
                    item.style.borderColor = "#bae6fd";
                    item.style.boxShadow = "0 10px 30px rgba(2, 132, 199, 0.15)";
                    item.style.background = "var(--card-bg)";
                    icon.style.transform = "scale(1)";
                }
            });

            requestAnimationFrame(animate);
        }
        
        // Mulai animasi
        animate();

        // 4. Interaksi Mouse Scroll (Wheel)
        scene.addEventListener('wheel', (e) => {
            if(e.cancelable) e.preventDefault(); 
            
            // Sensitivitas scroll (mendukung mouse & trackpad)
            let delta = Math.sign(e.deltaY) * Math.min(Math.abs(e.deltaY), 50);
            targetIndex += (delta * 0.015);
            
            // Batasi agar tidak keluar dari jumlah menu
            targetIndex = Math.max(0, Math.min(menuData.length - 1, targetIndex));
            
            // Otomatis merapikan (Snap) ke tengah setelah scroll berhenti
            clearTimeout(snapTimeout);
            snapTimeout = setTimeout(() => {
                targetIndex = Math.round(targetIndex);
            }, 150);
        }, { passive: false });

        // 5. Interaksi Sentuh & Geser
        function onPointerDown(e) {
            isDragging = true;
            hasMoved = false;
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            startDragIndex = targetIndex;
            scene.style.cursor = 'grabbing';
            clearTimeout(snapTimeout);
        }

        function onPointerMove(e) {
            if (!isDragging) return;
            const currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const diffX = currentX - startX;
            
            // Kecepatan geser
            const dragFactor = itemWidth * 0.7;
            targetIndex = startDragIndex - (diffX / dragFactor);
            
            // Batasan lembut (Soft Clamp) saat menggeser
            targetIndex = Math.max(-0.2, Math.min(menuData.length - 0.8, targetIndex));
            
            if (Math.abs(diffX) > 5) hasMoved = true;
        }

        function onPointerUp(e) {
            if (!isDragging) return;
            isDragging = false;
            scene.style.cursor = 'default';
            
            // Snap ke menu terdekat saat dilepas
            targetIndex = Math.round(targetIndex);
            targetIndex = Math.max(0, Math.min(menuData.length - 1, targetIndex));
        }

        // Listener Mouse
        scene.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);

        // Listener Sentuh (Mobile)
        scene.addEventListener('touchstart', onPointerDown, { passive: true });
        window.addEventListener('touchmove', onPointerMove, { passive: true });
        window.addEventListener('touchend', onPointerUp);

        // 6. Logika Klik Kartu ala iTunes
        items.forEach((item, i) => {
            item.addEventListener('click', (e) => {
                if (hasMoved) {
                    e.preventDefault(); // Batalkan klik jika baru saja digeser
                    return;
                }
                // Jika mengklik kartu yang BUKAN di tengah, geser kartu itu ke tengah
                if (Math.round(targetIndex) !== i) {
                    e.preventDefault(); 
                    targetIndex = i; // Pindahkan ke tengah
                }
                // Jika sudah di tengah, biarkan link terbuka secara natural (default action)
            });
            item.addEventListener('dragstart', (e) => e.preventDefault());
        });
    </script>
</body>
</html>
